<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Market Review Terminal</title>
<style>
:root{--bg:#0a0a0a;--surface:#111;--surface-2:#161616;--surface-3:#1e1e1e;--line:rgba(255,255,255,0.07);--line-2:rgba(255,255,255,0.13);--text:#f0f0f0;--muted:#555;--muted-2:#888;--white:#fff;--radius:4px;--radius-lg:8px}
[data-theme="light"]{--bg:#f5f5f5;--surface:#fff;--surface-2:#efefef;--surface-3:#e4e4e4;--line:rgba(0,0,0,0.07);--line-2:rgba(0,0,0,0.13);--text:#111;--muted:#bbb;--muted-2:#666;--white:#111}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Helvetica Neue",Helvetica,"PingFang SC",Arial,sans-serif;font-size:14px;line-height:1.6;min-height:100vh;letter-spacing:0.01em;transition:background .25s,color .25s}
.wrap{max-width:1240px;margin:0 auto;padding:32px 24px}

/* theme toggle fixed */
.theme-toggle{position:fixed;top:16px;right:20px;z-index:999;width:32px;height:32px;border-radius:50%;background:var(--surface-2);border:1px solid var(--line-2);color:var(--muted-2);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
.theme-toggle:hover{border-color:var(--muted-2);color:var(--text)}

.topbar{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;margin-bottom:22px;padding-bottom:22px;border-bottom:1px solid var(--line-2)}
.brand{font-size:38px;font-weight:800;letter-spacing:-0.04em;color:var(--white);line-height:1}
.brand-sub{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted-2);margin-top:6px}
.topbar-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
button{border:none;cursor:pointer;font:inherit;transition:.15s ease}

/* text buttons */
.tb-btn{height:30px;padding:0 11px;border-radius:2px;background:transparent;border:1px solid var(--line-2);color:var(--muted-2);font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;display:flex;align-items:center;gap:4px;cursor:pointer;transition:.15s;white-space:nowrap}
.tb-btn:hover{border-color:var(--muted-2);color:var(--text)}
.tb-btn.primary{background:var(--white);color:var(--bg);border-color:var(--white);font-weight:700}
.tb-btn.primary:hover{opacity:.85}
[data-theme="light"] .tb-btn.primary{background:#111;color:#fff;border-color:#111}
.tb-btn.danger:hover{border-color:#c0392b;color:#c0392b}

.statusbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding:9px 14px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);font-size:11px;color:var(--muted-2);letter-spacing:0.05em;text-transform:uppercase}
.s-dot{width:5px;height:5px;border-radius:50%;background:var(--muted);flex-shrink:0}
.s-dot.on{background:#5cdb5c;box-shadow:0 0 6px #5cdb5c}

.record-list{display:flex;flex-direction:column;gap:2px}
details.record{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden}
details.record[open]{border-color:var(--line-2);margin-bottom:8px}
summary{list-style:none;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:14px;padding:16px 18px;user-select:none}
summary::-webkit-details-marker{display:none}
summary:hover{background:var(--surface-2)}
details[open] summary{border-bottom:1px solid var(--line)}
.sum-left{display:flex;align-items:baseline;gap:14px}
.date-label{font-size:19px;font-weight:700;letter-spacing:-0.02em;color:var(--white)}
.date-sub{font-size:11px;color:var(--muted-2);letter-spacing:0.08em;text-transform:uppercase}
.sum-right{display:flex;gap:6px;align-items:center}
.chevron{font-size:11px;color:var(--muted);transition:transform .2s}
details[open] .chevron{transform:rotate(180deg)}

.record-body{padding:16px;display:flex;flex-direction:column;gap:18px;background:var(--bg)}
.asset-block{border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden}
.asset-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);background:var(--surface-2);gap:12px;flex-wrap:wrap}
.asset-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.asset-label{font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted-2)}
.asset-name{font-size:16px;font-weight:700;color:var(--white);letter-spacing:-0.01em}
[data-theme="light"] .asset-name{color:#111}

.ticker-bar{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.tick-chip{padding:4px 9px;border-radius:2px;border:1px solid var(--line-2);background:var(--surface);font-size:11px;letter-spacing:0.08em;color:var(--muted-2);cursor:pointer;font-family:"SF Mono","Fira Code",monospace;transition:.15s;display:flex;align-items:center;gap:5px}
.tick-chip:hover{background:var(--surface-3);color:var(--white)}
.tick-chip.active{background:var(--white);color:var(--bg);border-color:var(--white)}
[data-theme="light"] .tick-chip.active{background:#111;color:#fff;border-color:#111}
.tick-chip .del-chip{font-size:10px;opacity:.5;line-height:1}
.tick-chip .del-chip:hover{opacity:1}
.add-chip-form{display:flex;gap:4px;align-items:center}
.chip-input{background:var(--surface);border:1px solid var(--line-2);border-radius:2px;color:var(--text);font-size:11px;font-family:"SF Mono",monospace;letter-spacing:0.08em;padding:4px 9px;width:140px;outline:none}
.chip-input::placeholder{color:var(--muted)}
.chip-input:focus{background:var(--surface-3)}
.chip-input-label{font-size:11px;color:var(--muted-2);white-space:nowrap}
.go-btn{padding:4px 9px;border-radius:2px;background:var(--surface-3);color:var(--muted-2);font-size:11px;border:1px solid var(--line-2);letter-spacing:0.06em}
.go-btn:hover{color:var(--white)}
.asset-actions{display:flex;gap:6px;flex-shrink:0}

.chart-container{background:var(--bg);border-bottom:1px solid var(--line)}
.chart-frame{width:100%;height:340px;border:none;display:block}
.table-scroll{overflow-x:auto}
table{width:100%;min-width:820px;border-collapse:collapse;background:var(--surface)}
thead th{text-align:left;padding:10px 14px;font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted-2);border-bottom:1px solid var(--line-2);background:var(--surface-2)}
tbody td{padding:12px 14px;font-size:14px;line-height:1.65;border-bottom:1px solid var(--line);vertical-align:top;color:var(--text)}
tbody tr:last-child td{border-bottom:none}
tbody tr:nth-child(even) td{background:var(--surface-2)}
tbody tr:hover td{background:var(--surface-3)}
td[contenteditable="true"]:focus{outline:1px solid var(--line-2);background:var(--surface-3)!important}
td.phase{width:110px;font-family:"SF Mono","Fira Code",monospace;font-size:12px;color:var(--muted-2);text-align:center;white-space:nowrap}
td.level{width:140px;font-family:"SF Mono","Fira Code",monospace;font-size:13px;color:var(--white);font-weight:600}
[data-theme="light"] td.level{color:#111}
td.invalid{color:var(--muted-2);font-size:13px}
@media(max-width:900px){.topbar{flex-direction:column;align-items:flex-start}.sum-left{flex-direction:column;gap:4px}}
</style>
