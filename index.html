<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Review Terminal</title>
  <style>
    :root {
      --bg: #0a0a0a; --surface: #111; --surface-2: #161616; --surface-3: #1e1e1e;
      --line: rgba(255,255,255,0.07); --line-2: rgba(255,255,255,0.13);
      --text: #f0f0f0; --muted: #555; --muted-2: #888; --white: #fff;
      --radius: 4px; --radius-lg: 8px;
    }
    [data-theme="light"] {
      --bg: #f5f5f5; --surface: #fff; --surface-2: #efefef; --surface-3: #e4e4e4;
      --line: rgba(0,0,0,0.07); --line-2: rgba(0,0,0,0.13);
      --text: #111; --muted: #bbb; --muted-2: #666; --white: #111;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: "Helvetica Neue", Helvetica, "PingFang SC", Arial, sans-serif;
      font-size: 14px; line-height: 1.6; min-height: 100vh; letter-spacing: 0.01em;
      transition: background .25s, color .25s;
    }
    .wrap { max-width: 1240px; margin: 0 auto; padding: 32px 24px; }

    .topbar {
      display: flex; justify-content: space-between; align-items: flex-end;
      gap: 20px; margin-bottom: 22px; padding-bottom: 22px;
      border-bottom: 1px solid var(--line-2);
    }
    .brand { font-size: 38px; font-weight: 800; letter-spacing: -0.04em; color: var(--white); line-height: 1; }
    .brand-sub { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted-2); margin-top: 6px; }
    .topbar-right { display: flex; gap: 6px; align-items: center; }

    button { border: none; cursor: pointer; font: inherit; transition: .15s ease; }
    .icon-btn {
      width: 38px; height: 38px; border-radius: var(--radius);
      background: var(--surface-2); border: 1px solid var(--line-2);
      color: var(--muted-2); display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .icon-btn:hover { background: var(--surface-3); color: var(--white); }
    .new-btn {
      height: 38px; padding: 0 14px; border-radius: var(--radius);
      background: var(--white); color: var(--bg);
      font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      display: flex; align-items: center; gap: 6px;
    }
    [data-theme="light"] .new-btn { background: #111; color: #fff; }
    .new-btn:hover { opacity: .85; }

    .statusbar {
      display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
      padding: 9px 14px; background: var(--surface); border: 1px solid var(--line);
      border-radius: var(--radius); font-size: 11px; color: var(--muted-2);
      letter-spacing: 0.05em; text-transform: uppercase;
    }
    .s-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .s-dot.on { background: #5cdb5c; box-shadow: 0 0 6px #5cdb5c; }

    .record-list { display: flex; flex-direction: column; gap: 2px; }
    details.record { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; }
    details.record[open] { border-color: var(--line-2); margin-bottom: 8px; }
    summary {
      list-style: none; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center; gap: 14px;
      padding: 16px 18px; user-select: none;
    }
    summary::-webkit-details-marker { display: none; }
    summary:hover { background: var(--surface-2); }
    details[open] summary { border-bottom: 1px solid var(--line); }
    .sum-left { display: flex; align-items: baseline; gap: 14px; }
    .date-label { font-size: 19px; font-weight: 700; letter-spacing: -0.02em; color: var(--white); }
    .date-sub { font-size: 11px; color: var(--muted-2); letter-spacing: 0.08em; text-transform: uppercase; }
    .sum-right { display: flex; gap: 6px; align-items: center; }
    .chevron { font-size: 11px; color: var(--muted); transition: transform .2s; }
    details[open] .chevron { transform: rotate(180deg); }

    .record-body { padding: 16px; display: flex; flex-direction: column; gap: 18px; background: var(--bg); }
    .asset-block { border: 1px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; }
    .asset-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; border-bottom: 1px solid var(--line); background: var(--surface-2);
      gap: 12px; flex-wrap: wrap;
    }
    .asset-meta { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .asset-label { font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-2); }
    .asset-name { font-size: 16px; font-weight: 700; color: var(--white); letter-spacing: -0.01em; }
    [data-theme="light"] .asset-name { color: #111; }

    /* TICKER BAR */
    .ticker-bar { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
    .tick-chip {
      padding: 4px 9px; border-radius: 2px;
      border: 1px solid var(--line-2); background: var(--surface);
      font-size: 11px; letter-spacing: 0.08em; color: var(--muted-2); cursor: pointer;
      font-family: "SF Mono","Fira Code",monospace; transition: .15s;
      display: flex; align-items: center; gap: 5px;
    }
    .tick-chip:hover { background: var(--surface-3); color: var(--white); }
    .tick-chip.active { background: var(--white); color: var(--bg); border-color: var(--white); }
    [data-theme="light"] .tick-chip.active { background: #111; color: #fff; border-color: #111; }
    .tick-chip .del-chip { font-size: 10px; opacity: .5; line-height: 1; }
    .tick-chip .del-chip:hover { opacity: 1; }
    .add-chip-form { display: flex; gap: 4px; align-items: center; }
    .chip-input {
      background: var(--surface); border: 1px solid var(--line-2); border-radius: 2px;
      color: var(--text); font-size: 11px; font-family: "SF Mono",monospace;
      letter-spacing: 0.08em; padding: 4px 9px; width: 140px; outline: none;
    }
    .chip-input::placeholder { color: var(--muted); }
    .chip-input:focus { border-color: var(--line-2); background: var(--surface-3); }
    .chip-input-label { font-size: 11px; color: var(--muted-2); white-space: nowrap; }
    .go-btn {
      padding: 4px 9px; border-radius: 2px;
      background: var(--surface-3); color: var(--muted-2);
      font-size: 11px; border: 1px solid var(--line-2); letter-spacing: 0.06em;
    }
    .go-btn:hover { color: var(--white); }

    .asset-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .chart-container { background: var(--bg); border-bottom: 1px solid var(--line); }
    .chart-frame { width: 100%; height: 340px; border: none; display: block; }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; min-width: 820px; border-collapse: collapse; background: var(--surface); }
    thead th {
      text-align: left; padding: 10px 14px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted-2); border-bottom: 1px solid var(--line-2); background: var(--surface-2);
    }
    tbody td {
      padding: 12px 14px; font-size: 14px; line-height: 1.65;
      border-bottom: 1px solid var(--line); vertical-align: top; color: var(--text);
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:nth-child(even) td { background: var(--surface-2); }
    tbody tr:hover td { background: var(--surface-3); }
    td[contenteditable="true"]:focus { outline: 1px solid var(--line-2); background: var(--surface-3) !important; }
    td.phase { width: 110px; font-family: "SF Mono","Fira Code",monospace; font-size: 12px; color: var(--muted-2); text-align: center; white-space: nowrap; }
    td.level { width: 140px; font-family: "SF Mono","Fira Code",monospace; font-size: 13px; color: var(--white); font-weight: 600; }
    [data-theme="light"] td.level { color: #111; }
    td.invalid { color: var(--muted-2); font-size: 13px; }

    @media (max-width: 900px) {
      .topbar { flex-direction: column; align-items: flex-start; }
      .sum-left { flex-direction: column; gap: 4px; }
    }
  </style>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💩</text></svg>">
</head>
<body data-theme="dark">
<div class="wrap">

  <header class="topbar">
    <div>
      <div class="brand">Market Review</div>
      <div class="brand-sub">黄金 · A股 · 本地存储</div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="themeBtn" title="切换亮/暗色">◑</button>
      <button class="icon-btn" id="toggleAllBtn" title="展开 / 折叠">⊞</button>
      <button class="icon-btn" id="syncConfigBtn" title="配置 Gist 同步">⚙</button>
      <button class="icon-btn" id="syncPushBtn" title="上传到 Gist（备份）">↑</button>
      <button class="icon-btn" id="syncPullBtn" title="从 Gist 拉取（恢复）">↓</button>
      <button class="icon-btn" id="exportHtmlBtn" title="导出 HTML 归档快照">⬡</button>
      <button class="icon-btn" id="exportAllBtn" title="导出全部 CSV">⊞</button>
      <button class="icon-btn" id="printBtn" title="打印">⎙</button>
      <button class="new-btn" id="newRecordBtn">＋ 新建</button>
    </div>
  </header>

  <div class="statusbar">
    <span class="s-dot" id="sDot"></span>
    <span id="statusText">就绪 — 内容自动保存至本地浏览器</span>
  </div>

  <section class="record-list" id="recordList"></section>
</div>

<script>
  // ── GIST SYNC CONFIG ──
  // 填入你的 GitHub Token 和 Gist ID（见下方使用说明）
  const GIST_TOKEN = localStorage.getItem('gist_token') || '';
  const GIST_ID    = localStorage.getItem('gist_id')    || '';
  const GIST_FILE  = 'review_data.json';

  const content = document.documentElement.outerHTML;
  const ROWS = 5;
  const PRESET_KEY_GOLD   = 'presets_gold';
  const PRESET_KEY_ASHARE = 'presets_ashare';

  const DEFAULT_GOLD_PRESETS   = [{label:'XAUUSD',sym:'OANDA:XAUUSD'},{label:'XAGUSD',sym:'OANDA:XAGUSD'},{label:'GC1!',sym:'COMEX:GC1!'}];
  const DEFAULT_ASHARE_PRESETS = [
    {label:'上证',sym:'SSE:000001'},{label:'深证',sym:'SZSE:399001'},
    {label:'沪深300',sym:'SSE:000300'},{label:'创业板',sym:'SZSE:399006'},{label:'科创50',sym:'SSE:000688'}
  ];

  function loadPresets(key, defaults) {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(defaults));
  }
  function savePresets(key, arr) { localStorage.setItem(key, JSON.stringify(arr)); }

  const recordList = document.getElementById('recordList');
  const statusText = document.getElementById('statusText');
  const sDot       = document.getElementById('sDot');
  let allOpen = false;

  document.getElementById('themeBtn').addEventListener('click', () => {
    document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
    // refresh all chart iframes to match new theme
    document.querySelectorAll('.chart-frame').forEach(iframe => {
      iframe.src = iframe.src; // trigger reload with current src (tvURL reads theme at call time)
    });
    // rebuild src properly using tvURL per iframe's current symbol
    document.querySelectorAll('.chart-frame').forEach(iframe => {
      const url = new URL(iframe.src);
      const sym = decodeURIComponent(url.searchParams.get('symbol') || '');
      if (sym) iframe.src = tvURL(sym);
    });
  });

  function todayISO() {
    const d = new Date(), off = d.getTimezoneOffset();
    return new Date(d - off * 60000).toISOString().slice(0, 10);
  }
  function fmtDay(s) {
    const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    return days[new Date(s + 'T00:00:00').getDay()];
  }
  function emptyRows() {
    return Array.from({length:ROWS}, () => ({phase:'',judgment:'',levels:'',strategy:'',invalidation:''}));
  }
  function defaultRecord(date) {
    return {date, gold:emptyRows(), ashare:emptyRows(), goldSym:'OANDA:XAUUSD', ashareSym:'SSE:000001', meta:{updatedAt:''}};
  }
  const sKey = d => `journal_${d}`;
  function getAllDates() {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k.startsWith('journal_')) keys.push(k.replace('journal_',''));
    }
    return keys.sort().reverse();
  }
  function save(date, payload) {
    payload.meta.updatedAt = new Date().toLocaleString('zh-CN');
    localStorage.setItem(sKey(date), JSON.stringify(payload));
    sDot.className = 's-dot on';
    statusText.textContent = `已保存 · ${date} · ${payload.meta.updatedAt}`;
    setTimeout(() => { sDot.className = 's-dot'; }, 2500);
  }
  function loadRec(date) {
    const raw = localStorage.getItem(sKey(date));
    return raw ? JSON.parse(raw) : defaultRecord(date);
  }
  function readTable(table) {
    return Array.from(table.querySelectorAll('tbody tr')).map(tr => {
      const tds = tr.querySelectorAll('td');
      return {phase:tds[0].innerText.trim(), judgment:tds[1].innerText.trim(),
              levels:tds[2].innerText.trim(), strategy:tds[3].innerText.trim(), invalidation:tds[4].innerText.trim()};
    });
  }
  function buildRows(rows) {
    return rows.map(r => `<tr>
      <td class="phase"   contenteditable="true">${r.phase||''}</td>
      <td                 contenteditable="true">${r.judgment||''}</td>
      <td class="level"   contenteditable="true">${r.levels||''}</td>
      <td                 contenteditable="true">${r.strategy||''}</td>
      <td class="invalid" contenteditable="true">${r.invalidation||''}</td>
    </tr>`).join('');
  }
  function tvURL(sym) {
    const theme = document.body.dataset.theme === 'light' ? 'light' : 'dark';
    const bg    = theme === 'light' ? 'f5f5f5' : '0a0a0a';
    return `https://s.tradingview.com/widgetembed/?symbol=${encodeURIComponent(sym)}&interval=240&hidesidetoolbar=1&symboledit=1&saveimage=0&toolbarbg=${bg}&theme=${theme}&style=1&timezone=Asia%2FTaipei&studies=[]&hideideas=1`;
  }
  function exportCSV(date, el) {
    const g = readTable(el.querySelector('.gold-table'));
    const a = readTable(el.querySelector('.ashare-table'));
    const rows = [['日期','标的','阶段','核心判断','关键位','交易思路','失效 / 转向条件']];
    g.forEach(r => rows.push([date,'黄金',r.phase,r.judgment,r.levels,r.strategy,r.invalidation]));
    a.forEach(r => rows.push([date,'A股',r.phase,r.judgment,r.levels,r.strategy,r.invalidation]));
    const csv = rows.map(row => row.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8;'});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob); link.download = `复盘_${date}.csv`; link.click();
    URL.revokeObjectURL(link.href);
  }
  async function copyMD(el, type) {
    const table = el.querySelector(type==='gold' ? '.gold-table' : '.ashare-table');
    const rows = readTable(table);
    let md = `| 阶段 | 核心判断 | 关键位 | 交易思路 | 失效 / 转向条件 |\n|---|---|---|---|---|\n`;
    rows.forEach(r => { md += `| ${r.phase} | ${r.judgment} | ${r.levels} | ${r.strategy} | ${r.invalidation} |\n`; });
    try { await navigator.clipboard.writeText(md); statusText.textContent = '已复制为 Markdown'; }
    catch { statusText.textContent = '复制失败，请检查权限'; }
  }

  /* ── TICKER BAR ── */
  function buildTickerBar(presets, currentSym, frameId, presetKey) {
    const wrap = document.createElement('div');
    wrap.className = 'ticker-bar';
    wrap.dataset.frameId = frameId;
    wrap.dataset.presetKey = presetKey;

    function renderChips(activeSym) {
      wrap.innerHTML = '';
      presets.forEach((p, idx) => {
        const chip = document.createElement('span');
        chip.className = 'tick-chip' + (p.sym === activeSym ? ' active' : '');
        chip.innerHTML = `${p.label}<span class="del-chip" data-idx="${idx}" title="删除">✕</span>`;
        chip.addEventListener('click', e => {
          if (e.target.classList.contains('del-chip')) {
            e.stopPropagation();
            if (!confirm(`删除预设「${p.label}」？`)) return;
            presets.splice(idx, 1);
            savePresets(presetKey, presets);
            renderChips(activeSym);
            return;
          }
          wrap.querySelectorAll('.tick-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          const frame = document.getElementById(frameId);
          frame.src = tvURL(p.sym);
          wrap.dispatchEvent(new CustomEvent('symchange', {detail: p.sym, bubbles: true}));
        });
        wrap.appendChild(chip);
      });

      // add form
      const form = document.createElement('div');
      form.className = 'add-chip-form';
      form.innerHTML = `
        <span class="chip-input-label">标的：</span>
        <input class="chip-input" placeholder="代码，如 SZSE:399006" />
        <input class="chip-input" placeholder="名称，如 创业板" style="width:80px" />
        <button class="go-btn">添加</button>
      `;
      const [symInput, labelInput, addBtn] = [form.querySelector('input'), form.querySelectorAll('input')[1], form.querySelector('button')];
      const doAdd = () => {
        const sym = symInput.value.trim().toUpperCase();
        const label = labelInput.value.trim() || sym;
        if (!sym) return;
        if (presets.find(p => p.sym === sym)) {
          // just switch
          const frame = document.getElementById(frameId);
          frame.src = tvURL(sym);
          wrap.dispatchEvent(new CustomEvent('symchange', {detail: sym, bubbles: true}));
          renderChips(sym);
          return;
        }
        presets.push({label, sym});
        savePresets(presetKey, presets);
        symInput.value = ''; labelInput.value = '';
        renderChips(sym);
        const frame = document.getElementById(frameId);
        frame.src = tvURL(sym);
        wrap.dispatchEvent(new CustomEvent('symchange', {detail: sym, bubbles: true}));
      };
      addBtn.addEventListener('click', doAdd);
      symInput.addEventListener('keydown', e => { if (e.key === 'Enter') doAdd(); });
      labelInput.addEventListener('keydown', e => { if (e.key === 'Enter') doAdd(); });
      wrap.appendChild(form);
    }

    renderChips(currentSym);
    return wrap;
  }

  /* ── RENDER RECORD ── */
  function renderRecord(date, openByDefault) {
    const data       = loadRec(date);
    const day        = fmtDay(date);
    const goldFrameId   = `gf_${date.replace(/-/g,'_')}`;
    const ashareFrameId = `af_${date.replace(/-/g,'_')}`;
    const goldSym    = data.goldSym   || 'OANDA:XAUUSD';
    const ashareSym  = data.ashareSym || 'SSE:000001';

    const goldPresets   = loadPresets(PRESET_KEY_GOLD,   DEFAULT_GOLD_PRESETS);
    const asharePresets = loadPresets(PRESET_KEY_ASHARE, DEFAULT_ASHARE_PRESETS);

    const details = document.createElement('details');
    details.className = 'record';
    if (openByDefault) details.open = true;

    details.innerHTML = `
      <summary>
        <div class="sum-left">
          <span class="date-label">${date}</span>
          <span class="date-sub">${day} · ${data.meta.updatedAt || '未保存'}</span>
        </div>
        <div class="sum-right">
          <button class="icon-btn export-btn" title="导出 CSV">↓</button>
          <button class="icon-btn delete-btn" title="删除此日期">✕</button>
          <span class="chevron">▾</span>
        </div>
      </summary>
      <div class="record-body">
        <div class="asset-block">
          <div class="asset-header">
            <div class="asset-meta">
              <div>
                <div class="asset-label">Precious Metal</div>
                <div class="asset-name">黄金</div>
              </div>
              <div class="gold-ticker-wrap"></div>
            </div>
            <div class="asset-actions">
              <button class="icon-btn copy-gold-btn" title="复制为 Markdown">⎘</button>
            </div>
          </div>
          <div class="chart-container">
            <iframe id="${goldFrameId}" class="chart-frame" src="${tvURL(goldSym)}"></iframe>
          </div>
          <div class="table-scroll">
            <table class="gold-table">
              <thead><tr><th>阶段</th><th>核心判断</th><th>关键位</th><th>交易思路</th><th>失效 / 转向条件</th></tr></thead>
              <tbody>${buildRows(data.gold)}</tbody>
            </table>
          </div>
        </div>
        <div class="asset-block">
          <div class="asset-header">
            <div class="asset-meta">
              <div>
                <div class="asset-label">China Equity</div>
                <div class="asset-name">A 股</div>
              </div>
              <div class="ashare-ticker-wrap"></div>
            </div>
            <div class="asset-actions">
              <button class="icon-btn copy-ashare-btn" title="复制为 Markdown">⎘</button>
            </div>
          </div>
          <div class="chart-container">
            <iframe id="${ashareFrameId}" class="chart-frame" src="${tvURL(ashareSym)}"></iframe>
          </div>
          <div class="table-scroll">
            <table class="ashare-table">
              <thead><tr><th>阶段</th><th>核心判断</th><th>关键位</th><th>交易思路</th><th>失效 / 转向条件</th></tr></thead>
              <tbody>${buildRows(data.ashare)}</tbody>
            </table>
          </div>
        </div>
      </div>
    `;

    let curGoldSym   = goldSym;
    let curAshareSym = ashareSym;

    const goldBar   = buildTickerBar(goldPresets,   goldSym,   goldFrameId,   PRESET_KEY_GOLD);
    const ashareBar = buildTickerBar(asharePresets, ashareSym, ashareFrameId, PRESET_KEY_ASHARE);
    details.querySelector('.gold-ticker-wrap').appendChild(goldBar);
    details.querySelector('.ashare-ticker-wrap').appendChild(ashareBar);

    goldBar.addEventListener('symchange',   e => { curGoldSym   = e.detail; scheduleSave(); });
    ashareBar.addEventListener('symchange', e => { curAshareSym = e.detail; scheduleSave(); });

    function getPayload() {
      return { date,
        gold:      readTable(details.querySelector('.gold-table')),
        ashare:    readTable(details.querySelector('.ashare-table')),
        goldSym:   curGoldSym, ashareSym: curAshareSym, meta: {updatedAt:''}
      };
    }
    let timer;
    function scheduleSave() {
      sDot.className = 's-dot'; statusText.textContent = '编辑中…';
      clearTimeout(timer);
      timer = setTimeout(() => {
        const p = getPayload(); save(date, p);
        details.querySelector('.date-sub').textContent = `${day} · ${p.meta.updatedAt}`;
      }, 800);
    }
    details.addEventListener('input', scheduleSave);
    details.querySelector('.export-btn').addEventListener('click', e => { e.preventDefault(); exportCSV(date, details); });
    details.querySelector('.delete-btn').addEventListener('click', e => {
      e.preventDefault();
      if (!confirm(`删除 ${date} 的复盘记录？`)) return;
      localStorage.removeItem(sKey(date)); details.remove();
      statusText.textContent = `已删除 · ${date}`;
    });
    details.querySelector('.copy-gold-btn').addEventListener('click',   e => { e.preventDefault(); copyMD(details,'gold'); });
    details.querySelector('.copy-ashare-btn').addEventListener('click', e => { e.preventDefault(); copyMD(details,'ashare'); });
    return details;
  }

  function renderAll() {
    recordList.innerHTML = '';
    const dates = getAllDates();
    if (!dates.length) {
      const t = todayISO(); save(t, defaultRecord(t));
      recordList.appendChild(renderRecord(t, true)); return;
    }
    dates.forEach((d,i) => recordList.appendChild(renderRecord(d, i===0)));
  }

  document.getElementById('newRecordBtn').addEventListener('click', () => {
    const today = todayISO();
    const custom = localStorage.getItem(sKey(today))
      ? (prompt('今日记录已存在，输入其他日期（YYYY-MM-DD）：', today) || '') : today;
    if (!custom) return;
    if (!/^\d{4}-\d{2}-\d{2}$/.test(custom)) { alert('日期格式不正确'); return; }
    if (localStorage.getItem(sKey(custom))) { alert('该日期已存在'); return; }
    save(custom, defaultRecord(custom)); renderAll();
  });
  document.getElementById('toggleAllBtn').addEventListener('click', () => {
    allOpen = !allOpen;
    document.querySelectorAll('details.record').forEach(d => d.open = allOpen);
    document.getElementById('toggleAllBtn').textContent = allOpen ? '⊟' : '⊞';
  });
  document.getElementById('exportAllBtn').addEventListener('click', () => {
    document.querySelectorAll('details.record').forEach(el => {
      const d = el.querySelector('.date-label')?.textContent;
      if (d) exportCSV(d, el);
    });
  });
  document.getElementById('printBtn').addEventListener('click', () => window.print());
  // ── EXPORT HTML SNAPSHOT ──
  document.getElementById('exportHtmlBtn').addEventListener('click', () => {
    const backup = {};
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k.startsWith('journal_') || k.startsWith('presets_')) {
        backup[k] = localStorage.getItem(k);
      }
    }
    const inject = `<script>
      (function(){
        const data = ${JSON.stringify(backup)};
        Object.keys(data).forEach(k => {
          if (!localStorage.getItem(k)) localStorage.setItem(k, data[k]);
        });
      })();
    <\/script>`;
    const snapshot = content.replace('</head>', inject + '\n</head>');
    const blob = new Blob([snapshot], {type: 'text/html;charset=utf-8'});
    const link = document.createElement('a');
    const date = todayISO();
    link.href = URL.createObjectURL(blob);
    link.download = `复盘归档_${date}.html`;
    link.click();
    URL.revokeObjectURL(link.href);
    statusText.textContent = `归档完成 · 复盘归档_${date}.html`;
  });

  renderAll();
</script>
</body>
</html>
